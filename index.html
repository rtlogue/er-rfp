<style>

.box{background:#fff;border:1px solid #dfe3e8;border-radius:14px;padding:34px 30px;width:340px;box-shadow:0 8px 30px rgba(0,0,0,.07);text-align:center}

.lock{font-size:30px;margin-bottom:8px}

async function unlock(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(SALT),iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(IV)},key,b64(CT));
  return new TextDecoder().decode(plain);
}
document.getElementById("f").addEventListener("submit",async e=>{
  e.preventDefault();
  const err=document.getElementById("err");err.textContent="";
  try{
    const html=await unlock(document.getElementById("pw").value);
    sessionStorage.setItem("erpw",document.getElementById("pw").value);
    document.open();document.write(html);document.close();
  }catch(_){err.textContent="Incorrect password.";}
});
// auto-unlock within a session if already entered
(async()=>{const p=sessionStorage.getItem("erpw");if(p){try{const html=await unlock(p);document.open();document.write(html);document.close();}catch(_){}}})();
